packages:
  - packages/*

catalog:
  "@rolldown/plugin-babel": ^0.2.3
  "@storybook/addon-a11y": ^10.5.3
  "@storybook/addon-docs": ^10.5.3
  "@storybook/react-vite": ^10.5.3
  "@tanstack/react-query": ^5.101.4
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@types/vscode-webview": ^1.57.5
  "@vitejs/plugin-react": ^6.0.4
  "@vscode-elements/react-elements": ^2.4.0
  "@vscode/codicons": ^0.0.45
  babel-plugin-react-compiler: ^1.0.0
  coder: github:coder/coder#v2.34.1
  date-fns: ^4.4.0
  react: ^19.2.8
  react-dom: ^19.2.8
  typescript: ^6.0.3
  vite: ^8.1.5

catalogMode: strict

dedupePeers: true

allowBuilds:
  "@vscode/vsce-sign": true
  bufferutil: true
  electron: true
  esbuild: true
  keytar: false
  odiff-bin: true
  unrs-resolver: true
  utf-8-validate: true

overrides:
  "@vscode-elements/elements": ^2.5.1

minimumReleaseAgeExclude:
  - "@coder/pixel-storybook@0.2.2"
  - "@opentelemetry/api-logs@0.221.0"
  - "@vitejs/plugin-react@6.0.4"
  - react-dom@19.2.8
  - react@19.2.8
