version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 3
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Pinned to engines.vscode minimum; bump manually with engine updates.
      - dependency-name: "@types/vscode"
      - dependency-name: "electron"
      # Must match the versions specified in coder/coder exactly.
      - dependency-name: "@types/ua-parser-js"
      - dependency-name: "ua-parser-js"
      # @types/node major must match our minimum Node.js version.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
