name: CI

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm, Node.js, and dependencies
        uses: ./.github/actions/setup

      - run: pnpm typecheck

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm build

  test-unit:
    name: Unit Test (${{ matrix.os }}, Electron ${{ matrix.electron-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Minimum supported version: VS Code 1.106 (Oct 2025) -> Electron 37 -> Node 22
        # See https://github.com/ewanharris/vscode-versions for version mapping
        os: [ubuntu-24.04]
        electron-version: ["37", "latest"]
        # Smoke-test latest Electron on Windows + macOS; older Electron stays Linux-only.
        include:
          - os: windows-latest
            electron-version: "latest"
          - os: macos-latest
            electron-version: "latest"

    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm, Node.js, and dependencies
        uses: ./.github/actions/setup

      - name: Run tests with Electron ${{ matrix.electron-version }}
        run: ./scripts/test-electron.sh ${{ matrix.electron-version }}
        shell: bash
        env:
          CI: true

  test-integration:
    name: Integration Test (${{ matrix.os }}, VS Code ${{ matrix.vscode-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        vscode-version: ["1.106.0", "stable"]
        include:
          - os: windows-latest
            vscode-version: "stable"
          - os: macos-latest
            vscode-version: "stable"

    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm, Node.js, and dependencies
        uses: ./.github/actions/setup

      - run: pnpm build

      - name: Run integration tests on VS Code ${{ matrix.vscode-version }} (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a pnpm test:integration --label "VS Code ${{ matrix.vscode-version }}"

      - name: Run integration tests on VS Code ${{ matrix.vscode-version }} (Windows/macOS)
        if: runner.os != 'Linux'
        run: pnpm test:integration --label "VS Code ${{ matrix.vscode-version }}"
        shell: bash

  package:
    name: Package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm, Node.js, and dependencies
        uses: ./.github/actions/setup

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Setup package path
        id: setup
        run: |
          EXTENSION_NAME=$(node -e "console.log(require('./package.json').name)")
          # Add commit SHA for CI builds
          SHORT_SHA=$(git rev-parse --short HEAD)
          PACKAGE_NAME="${EXTENSION_NAME}-${{ steps.version.outputs.version }}-${SHORT_SHA}.vsix"
          echo "packageName=$PACKAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build extension
        run: pnpm build:production

      - name: Package extension
        run: pnpm vsce package --no-dependencies --out "${{ steps.setup.outputs.packageName }}"

      - name: Upload artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.setup.outputs.packageName }}
          if-no-files-found: error
          retention-days: 7
          archive: false

      - name: Upload artifact (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.setup.outputs.packageName }}
          if-no-files-found: error
          archive: false
